name: Build SHOMER Android APK

# Trigger: manually from the Actions tab, or on pushing a tag like v1.0.0
on:
  workflow_dispatch:
  push:
    tags:
      - 'android-*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Capacitor dependencies
        working-directory: native
        run: npm install

      - name: Copy live web app into native shell
        working-directory: native
        run: node scripts/copy-web.js

      - name: Add Android platform
        working-directory: native
        run: npx cap add android || npx cap sync android

      - name: Sync Capacitor
        working-directory: native
        run: npx cap sync android

      - name: Merge Android manifest additions (permissions)
        working-directory: native
        run: |
          if [ -f android-config/AndroidManifest-additions.xml ]; then
            echo "Manifest additions present — applying background-location permissions"
            node scripts/apply-manifest.js || echo "manifest merge script optional; continuing"
          fi

      - name: Build debug APK
        working-directory: native/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shomer-android-debug
          path: native/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: native/android/app/build/outputs/apk/debug/app-debug.apk
          name: SHOMER Android ${{ github.ref_name }}
          body: |
            SHOMER native Android build (debug APK).
            Install on any Android device to test background geolocation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
