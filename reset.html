<!doctype html>
<html lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex">
<title>SHOMER — Updating to latest…</title>
<!--
  BULLETPROOF RESET / ESCAPE-HATCH PAGE.

  Why this exists: a phone can get STUCK on an old, sticky service worker that
  serves a stale cached shomer.html on every launch — so any new self-heal code
  inside shomer.html never even runs. The trap can't be cleared from inside the
  trapped page.

  This file lives at a path NO old service worker ever cached. A cache-first old
  SW does caches.match('reset.html') -> MISS -> falls through to the network and
  fetches THIS fresh copy. A network-first old SW fetches it from the network
  anyway. Either way the browser is forced to the network, this page loads, and
  it then unregisters EVERY service worker + clears EVERY cache on the origin and
  bounces to a clean shomer.html — guaranteed latest build.

  Keep this page DEPENDENCY-FREE (no external CSS/JS/SW) so nothing about it can
  be intercepted or cached against the user.
-->
<style>
  html,body{margin:0;height:100%}
  body{background:#0A1422;color:#E8EDF5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Heebo,Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px}
  .ring{width:46px;height:46px;border-radius:50%;border:4px solid rgba(232,237,245,.18);border-top-color:#E8C66B;animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:18px;font-weight:800;margin:6px 0 0;letter-spacing:.3px}
  p{font-size:13px;line-height:1.6;color:#9FB0C6;margin:0;max-width:300px}
  .v{font-size:11px;color:#5E708A;margin-top:8px}
  a{color:#E8C66B;font-weight:700;text-decoration:none}
</style>
</head>
<body>
  <div class="ring" aria-hidden="true"></div>
  <h1>מעדכן את שׁוֹמֵר לגרסה האחרונה…</h1>
  <p dir="auto">Updating SHOMER to the latest version. This clears an old cached copy and reloads the newest build — it only takes a moment.<br>جارٍ التحديث لأحدث إصدار…</p>
  <p class="v" id="status">Clearing service workers &amp; caches…</p>
  <p class="v"><a id="manual" href="shomer.html?fresh=1">Tap here if this doesn't continue automatically →</a></p>
<script>
(function(){
  var status=document.getElementById('status');
  function say(t){ try{ status.textContent=t; }catch(e){} }
  // Land on a clean shomer.html (cache-busted) once teardown is done. The query
  // is stripped by shomer.html itself, so there's no reload loop.
  var dest='shomer.html?fresh=' + (Date.now());
  var done=false;
  function go(){ if(done) return; done=true; location.replace(dest); }
  // Hard fallback: never leave the user stranded on this page.
  setTimeout(go, 4000);

  var jobs=[];
  // 1) Unregister EVERY service worker on this origin (including SHOMER's own old ones).
  if('serviceWorker' in navigator){
    jobs.push(
      navigator.serviceWorker.getRegistrations()
        .then(function(rs){ return Promise.all(rs.map(function(r){ return r.unregister().catch(function(){}); })); })
        .catch(function(){})
    );
  }
  // 2) Delete EVERY CacheStorage bucket on this origin.
  if(window.caches && caches.keys){
    jobs.push(
      caches.keys()
        .then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k).catch(function(){}); })); })
        .catch(function(){})
    );
  }
  Promise.all(jobs).then(function(){ say('Done — loading the latest build…'); go(); }, go);
})();
</script>
</body>
</html>
