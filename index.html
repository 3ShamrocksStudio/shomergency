<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0A1628">
  <title>שומר • SH✡MER</title>
  <meta name="description" content="אזרחים עוזרים לאזרחים. אזעקה. מיקום. עזרה.">
  <link rel="canonical" href="https://3shamrocksstudio.github.io/shomergency/">
  <link rel="icon" type="image/png" href="logo-192.png">
  <link rel="apple-touch-icon" href="logo-192.png">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --n0:#060F1E; --n1:#0A1628; --n2:#101E34;
      --g3:#E0A828; --g4:#F5C840; --p3:#B6C2D6; --tx0:#F0F4FF; --tx1:#C8D4E8;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html,body { background:var(--n1); color:var(--tx0); font-family:'Inter','Heebo',system-ui,sans-serif; }
    body { font-size:15px; }
    a { color:var(--g3); text-decoration:none; }
    .container { max-width:1100px; margin:0 auto; padding:0 20px; }
    header { padding:16px 0; background:var(--n0); border-bottom:1px solid rgba(255,255,255,.08); }
    .nav { display:flex; justify-content:space-between; align-items:center; }
    .logo img { width:52px; height:52px; }
    .hero { min-height:420px; background:linear-gradient(rgba(6,15,30,.7),rgba(10,22,40,.8)), url('SHOMER-KeyVisual.jpg') center/cover; display:flex; align-items:center; padding:40px 0; }
    .hero h1 { font-size:36px; line-height:1.1; margin-bottom:8px; }
    .hero p { font-size:16px; color:var(--p3); max-width:420px; margin-bottom:20px; }
    .btn { display:inline-block; padding:12px 22px; border-radius:999px; font-weight:600; }
    .btn-main { background:var(--g3); color:var(--n1); }
    .section { padding:40px 0; }
    .mockups { display:flex; gap:12px; overflow-x:auto; padding:10px 0; }
    .phone { width:180px; background:#111; border-radius:28px; padding:8px; flex-shrink:0; box-shadow:0 8px 20px rgba(0,0,0,.4); }
    .phone img { width:100%; border-radius:18px; display:block; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; }
    .card { background:var(--n2); padding:16px; border-radius:10px; }
    footer { padding:24px 0; background:var(--n0); font-size:13px; color:var(--p3); }
    .small { font-size:13px; }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="nav">
        <div class="logo"><img src="SHOMER_logo_big.png" alt="שומר"></div>
        <a href="shomer.html" class="btn btn-main small">פתח</a>
      </div>
    </div>
  </header>

  <div class="hero">
    <div class="container">
      <h1>שומר.<br>אזרחים עוזרים לאזרחים.</h1>
      <p>אזעקה. מיקום. עזרה. פשוט.</p>
      <a href="shomer.html" class="btn btn-main">התקן עכשיו</a>
    </div>
  </div>

  <div class="section container">
    <h2 style="margin-bottom:12px;">איך זה עובד</h2>
    <div class="mockups">
      <div class="phone"><img src="_redesign/proof-final/1-onboarding.png" alt=""></div>
      <div class="phone"><img src="_redesign/proof-final/2-map-legend.png" alt=""></div>
      <div class="phone"><img src="_redesign/proof-final/4-alarm.png" alt=""></div>
      <div class="phone"><img src="_redesign/proof-final/3-report.png" alt=""></div>
    </div>
  </div>

  <div class="section container">
    <div class="grid">
      <div class="card">
        <h3>לחץ</h3>
        <p class="small">אזעקה יוצאת מיד.</p>
      </div>
      <div class="card">
        <h3>שתף</h3>
        <p class="small">האנשים שלך רואים.</p>
      </div>
      <div class="card">
        <h3>עזור</h3>
        <p class="small">דווח. הגן.</p>
      </div>
    </div>
  </div>

  <div class="section container" style="text-align:center;">
    <a href="shomer.html" class="btn btn-main">התקן עכשיו</a>
    <p class="small" style="margin-top:12px;">ללא חנות. עובד בלי רשת.</p>
  </div>

  <footer>
    <div class="container">
      שומר. אזרחים עוזרים לאזרחים.<br>
      <a href="https://www.linkedin.com/in/davemarkovich" style="margin-right:8px;">לינקדאין</a>
      <a href="https://3shamrocksstudio.github.io/shomer-forest/">יער</a>
      <p class="small" style="margin-top:8px;">לא מחליף 100 / 101 / 102.</p>
    </div>
  </footer>
</body>
</html>
