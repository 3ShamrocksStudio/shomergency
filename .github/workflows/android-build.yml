name: Build SHOMER Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'android-*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Capacitor dependencies
        working-directory: native
        run: npm install

      - name: Copy live web app into native shell (with native CSP patch)
        working-directory: native
        run: node scripts/copy-web.js

      - name: Add Android platform
        working-directory: native
        run: npx cap add android

      - name: Generate branded app icons + splash
        working-directory: native
        run: |
          npm install @capacitor/assets --save-dev
          npx capacitor-assets generate --android || echo "asset gen fallback"

      - name: Sync Capacitor
        working-directory: native
        run: npx cap sync android

      - name: Merge Android manifest additions (permissions)
        working-directory: native
        run: node scripts/apply-manifest.js || echo "manifest merge optional"

      - name: Build debug APK
        working-directory: native/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shomer-android-debug
          path: native/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
